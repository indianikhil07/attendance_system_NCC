<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AttendEase</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1D9E75;--green-d:#0F6E56;--green-l:#E1F5EE;--green-b:#5DCAA5;
  --blue:#378ADD;--blue-d:#185FA5;--blue-l:#E6F1FB;--blue-b:#85B7EB;
  --red:#E24B4A;--red-d:#A32D2D;--red-l:#FCEBEB;--red-b:#F09595;
  --amber:#BA7517;--amber-l:#FAEEDA;--amber-b:#EF9F27;--amber-t:#633806;
  --bg:#F3F2ED;--card:#fff;--border:rgba(0,0,0,0.08);
  --border-md:rgba(0,0,0,0.15);--text:#191919;--muted:#686868;
  --faint:#A8A8A8;--surface:#EEEEE8;--radius:13px;--rsm:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem 1rem 5rem}
.app{max-width:520px;margin:0 auto}
.hdr{text-align:center;margin-bottom:1.4rem}
.logo{display:inline-flex;align-items:center;gap:9px;margin-bottom:4px}
.logo-icon{width:36px;height:36px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700}
.hdr h1{font-size:21px;font-weight:700}
.hdr p{font-size:13px;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;box-shadow:0 2px 16px rgba(0,0,0,0.05);animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.toggle{display:flex;gap:7px;margin-bottom:1.2rem}
.tog{flex:1;padding:9px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .14s}
.tog.ab{background:var(--blue-l);border-color:var(--blue);color:var(--blue-d)}
.tog.ag{background:var(--green-l);border-color:var(--green-b);color:var(--green-d)}
.ctitle{font-size:18px;font-weight:700;margin-bottom:3px}
.csub{font-size:13px;color:var(--muted);margin-bottom:1.2rem}
label{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px;margin-top:13px}
input[type=text],input[type=password],input[type=number]{width:100%;padding:10px 12px;border:1px solid var(--border-md);border-radius:var(--rsm);font-size:14px;font-family:inherit;background:#fff;color:var(--text);transition:border-color .14s,box-shadow .14s}
input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.btn{width:100%;padding:11px;margin-top:12px;border-radius:var(--rsm);border:1px solid var(--border-md);background:#fff;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .14s;text-align:center}
.btn:hover{background:var(--surface)}
.btn.green{background:var(--green);border-color:var(--green-d);color:#fff}
.btn.green:hover{background:var(--green-d)}
.btn.blue{background:var(--blue);border-color:var(--blue-d);color:#fff}
.btn.blue:hover{background:var(--blue-d)}
.btn.red{border-color:var(--red-b);color:var(--red-d)}
.btn.red:hover{background:var(--red-l)}
.btn.sm{width:auto;padding:6px 13px;margin-top:0;font-size:12px}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn{margin-top:0;flex:1}
.cap-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:12px 15px;display:flex;align-items:center;justify-content:space-between;margin-top:11px}
.cap-q{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;letter-spacing:3px}
.cap-ref{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:0;transition:transform .3s}
.cap-ref:hover{transform:rotate(180deg)}
.msg-box{font-size:12px;margin-top:8px;padding:9px 13px;border-radius:6px}
.msg-box.err{color:var(--red-d);background:var(--red-l)}
.msg-box.ok{color:var(--green-d);background:var(--green-l)}
.msg-box.info{color:var(--blue-d);background:var(--blue-l)}
.divider{border:none;border-top:1px solid var(--border);margin:1.2rem 0}
.stitle{font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:1rem}
.stat{background:var(--surface);border-radius:var(--rsm);padding:13px;text-align:center}
.stat-num{font-size:24px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.pbar{height:6px;border-radius:3px;background:var(--surface);overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .5s ease}
.plbl{font-size:12px;color:var(--muted);margin-top:5px;margin-bottom:1.1rem}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge.present{background:var(--green-l);color:var(--green-d)}
.badge.absent{background:var(--red-l);color:var(--red-d)}
.badge.medical{background:var(--blue-l);color:var(--blue-d)}
.back-btn{background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;padding:0;margin-bottom:1rem;display:flex;align-items:center;gap:4px}
.back-btn:hover{color:var(--text)}
.slist{max-height:420px;overflow-y:auto;padding-right:2px}
.slist::-webkit-scrollbar{width:4px}
.slist::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:2px}
.no-data{font-size:13px;color:var(--muted);padding:8px 0}
.info-box{background:var(--amber-l);border:1px solid var(--amber-b);border-radius:var(--rsm);padding:10px 13px;font-size:12px;color:var(--amber-t);margin-bottom:12px}
/* NAV */
.inav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem}
.inav-btn{padding:13px 8px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--surface);cursor:pointer;font-family:inherit;text-align:center;transition:all .14s}
.inav-btn:hover{background:#e8e8e2}
.inav-btn .icon{font-size:20px;margin-bottom:4px}
.inav-btn .lbl{font-size:11px;font-weight:600;color:var(--muted)}
.inav-btn.sel-mark{border-color:var(--green-b);background:var(--green-l)}
.inav-btn.sel-mark .lbl{color:var(--green-d)}
.inav-btn.sel-check{border-color:var(--blue-b);background:var(--blue-l)}
.inav-btn.sel-check .lbl{color:var(--blue-d)}
.inav-btn.sel-ncc{border-color:var(--amber-b);background:var(--amber-l)}
.inav-btn.sel-ncc .lbl{color:var(--amber-t)}
/* STUDENT TICK */
.stu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rsm);background:#fff;margin-bottom:6px;transition:all .13s}
.stu-info{flex:1;min-width:0}
.stu-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stu-id{font-size:12px;color:var(--muted);margin-top:1px}
.stu-btns{display:flex;gap:5px;flex-shrink:0}
.sb{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border-md);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.sb:hover{transform:scale(1.12)}
.sb.sp{background:var(--green);border-color:var(--green-d);box-shadow:0 0 0 2px var(--green-l)}
.sb.sa{background:var(--red);border-color:var(--red-d);box-shadow:0 0 0 2px var(--red-l)}
.sb.sm2{background:var(--blue);border-color:var(--blue-d);box-shadow:0 0 0 2px var(--blue-l)}
.stu-item.ip{border-color:var(--green-b);background:var(--green-l)}
.stu-item.ia{border-color:var(--red-b);background:var(--red-l)}
.stu-item.im{border-color:var(--blue-b);background:var(--blue-l)}
.slbl{font-size:11px;font-weight:700;white-space:nowrap}
.slbl.present{color:var(--green-d)}
.slbl.absent{color:var(--red-d)}
.slbl.medical{color:var(--blue-d)}
/* HOURS BOX */
.hours-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);padding:13px;margin-top:12px}
.hours-box .ht{font-size:13px;font-weight:600;margin-bottom:6px}
.hours-box .hi{font-size:12px;color:var(--muted);margin-bottom:8px}
/* DAY CARD */
.day-card{border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:8px;overflow:hidden}
.day-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;background:#fff;transition:background .12s}
.day-head:hover{background:var(--surface)}
.day-body{display:none;padding:10px 14px;background:var(--surface)}
.day-body.open{display:block}
.day-stu-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.day-stu-row:last-child{border-bottom:none}
/* NCC */
.ncc-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.ncc-row:last-child{border-bottom:none}
/* VERIFY */
.pct-big{font-size:52px;font-weight:700;line-height:1;text-align:center}
.pct-lbl{font-size:13px;color:var(--muted);text-align:center;margin-top:4px;margin-bottom:1.1rem}
.att-entry{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--rsm);border:1px solid var(--border);margin-bottom:6px}
.att-entry.present{background:var(--green-l);border-color:var(--green-b)}
.att-entry.absent{background:var(--red-l);border-color:var(--red-b)}
.att-entry.medical{background:var(--blue-l);border-color:var(--blue-b)}
.att-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.att-entry.present .att-dot{background:var(--green)}
.att-entry.absent .att-dot{background:var(--red)}
.att-entry.medical .att-dot{background:var(--blue)}
.att-info{flex:1}
.att-date{font-size:13px;font-weight:600}
.att-sess{font-size:12px;margin-top:1px;opacity:.8}
.att-entry.present .att-date,.att-entry.present .att-sess{color:var(--green-d)}
.att-entry.absent .att-date,.att-entry.absent .att-sess{color:var(--red-d)}
.att-entry.medical .att-date,.att-entry.medical .att-sess{color:var(--blue-d)}
.att-right{text-align:right;flex-shrink:0}
.att-status{font-size:12px;font-weight:700}
.att-hrs{font-size:11px;margin-top:2px;opacity:.85}
.srch{margin-bottom:10px}
.srch input{margin-top:0}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.4s infinite;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
/* LOADING */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border-md);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-bar{font-size:12px;color:var(--muted);text-align:center;padding:6px;display:flex;align-items:center;justify-content:center;gap:6px}
/* EDIT MODAL simulation */
.edit-panel{background:var(--surface);border:1px solid var(--border-md);border-radius:var(--rsm);padding:13px;margin-top:8px}
.edit-panel .ep-title{font-size:13px;font-weight:600;margin-bottom:10px}
.edit-stu-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.edit-stu-row:last-child{border-bottom:none}
.edit-stu-name{flex:1;font-weight:500}
.edit-btns{display:flex;gap:4px}
.eb{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border-md);background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.eb.ep{background:var(--green);border-color:var(--green-d)}
.eb.ea{background:var(--red);border-color:var(--red-d)}
.eb.em{background:var(--blue);border-color:var(--blue-d)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <h1>AttendEase</h1>
    </div>
    <p>Smart attendance &amp; NCC hour tracking</p>
  </div>
  <div id="sync-status"></div>
  <div id="root"></div>
</div>

<script>
// ══════════════════════════════════════════════
// STORAGE — one key, personal storage (shared=false)
// personal = scoped to this claude.ai account only
// so same user on laptop + mobile shares data correctly
// ══════════════════════════════════════════════

const STORAGE_KEY = 'attendease_v6_all';

// ALL data in ONE atomic object — codes + users + sessions + active
// This prevents codes and users ever going out of sync
const DEFAULT_CODES = [
  {code:'INST188969', instructorId:null},
  {code:'INST074493', instructorId:null},
  {code:'INST128783', instructorId:null},
  {code:'INST188907', instructorId:null},
  {code:'INST2024',   instructorId:null}
];

let DB = {
  codes:    JSON.parse(JSON.stringify(DEFAULT_CODES)),
  users:    {},
  sessions: [],
  active:   {}
};

async function cloudLoad() {
  try {
    // shared=false → personal to this claude.ai account, syncs across devices for same user
    const result = await window.storage.get(STORAGE_KEY, false);
    if (result && result.value) return JSON.parse(result.value);
  } catch(e) {}
  // Try localStorage fallback
  try {
    const ls = localStorage.getItem(STORAGE_KEY);
    if (ls) return JSON.parse(ls);
  } catch(e) {}
  return null;
}

async function saveDB() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(DB), false);
  } catch(e) {}
  // Always also write to localStorage as backup
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); } catch(e) {}
}

async function loadDB() {
  showSync('loading');
  const data = await cloudLoad();
  if (data) {
    // Restore codes — but always ensure all 5 default codes exist in array
    if (data.codes && Array.isArray(data.codes) && data.codes.length > 0) {
      DB.codes = data.codes;
      // Add any missing default codes that aren't in saved data
      DEFAULT_CODES.forEach(dc => {
        if (!DB.codes.find(c => c.code === dc.code)) {
          DB.codes.push({code: dc.code, instructorId: null});
        }
      });
    }
    DB.users    = data.users    || {};
    DB.sessions = data.sessions || [];
    DB.active   = data.active   || {};
  }
  hideSync();
}

function findCode(codeStr) {
  return DB.codes.find(c => c.code === codeStr.trim().toUpperCase());
}

function showSync(type) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (type === 'loading') {
    el.innerHTML = `<div class="sync-bar"><span class="spinner"></span>Loading data from cloud…</div>`;
  } else if (type === 'saving') {
    el.innerHTML = `<div class="sync-bar"><span class="spinner"></span>Saving…</div>`;
  }
}
function hideSync() {
  const el = document.getElementById('sync-status');
  if (el) el.innerHTML = '';
}

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let ST = {
  screen: 'home', role: 'student', tab: 'login',
  user: null, msg: '', msgType: 'err',
  ca: 0, cb: 0,
  instrPanel: 'mark',
  expandedDays: {},
  editingSessionId: null,
  studSubscreen: 'dash',
  markSearch: '', checkSearch: '', nccSearch: '',
  saving: false
};

function genCaptcha() { ST.ca = Math.floor(Math.random()*12)+1; ST.cb = Math.floor(Math.random()*12)+1; }

// ══════════════════════════════════════════════
// HOURS CALC
// hours: instructor-entered per session (same for everyone)
// present → +hours, absent → -hours, medical → 0
// ══════════════════════════════════════════════
function calcNccHours(studentId, instructorId) {
  const closed = DB.sessions.filter(s => s.instructorId === instructorId && s.closed);
  let total = 0;
  closed.forEach(s => {
    const status = (s.attendance || {})[studentId];
    if (!status || status === 'medical') return;
    const h = parseFloat(s.hours) || 0;
    total += status === 'present' ? h : -h;
  });
  return Math.round(total * 10) / 10;
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  document.getElementById('root').innerHTML = buildView();
  bindAll();
}

function buildView() {
  if (ST.screen === 'dash') {
    if (ST.user.role === 'instructor') return instrDash();
    if (ST.studSubscreen === 'verify') return studVerify();
    return studDash();
  }
  return homeView();
}

// ══════════════════════════════════════════════
// HOME
// ══════════════════════════════════════════════
function homeView() {
  return `<div class="card">
    <div class="toggle">
      <button class="tog ${ST.role==='student'?'ab':''}" onclick="setRole('student')">🎓 Student</button>
      <button class="tog ${ST.role==='instructor'?'ab':''}" onclick="setRole('instructor')">📋 Instructor</button>
    </div>
    <div class="ctitle">${ST.role==='instructor'?'Instructor Portal':'Student Portal'}</div>
    <div class="csub">${ST.role==='instructor'?'Mark attendance, check records & NCC hours':'View your attendance and NCC hours'}</div>
    <div class="toggle">
      <button class="tog ${ST.tab==='login'?'ag':''}" onclick="setTab('login')">Login</button>
      <button class="tog ${ST.tab==='reg'?'ag':''}" onclick="setTab('reg')">Register</button>
    </div>
    ${ST.tab==='login' ? loginForm() : regForm()}
    ${ST.msg ? `<div class="msg-box ${ST.msgType}">${ST.msg}</div>` : ''}
  </div>`;
}

function loginForm() {
  return `
    <label>Your ID</label>
    <input id="lid" type="text" placeholder="Your ID" autocomplete="off">
    <label>Password</label>
    <input id="lpwd" type="password" placeholder="Password">
    <label>Captcha — ${ST.ca} + ${ST.cb} = ?</label>
    <div class="cap-box">
      <span class="cap-q">${ST.ca} + ${ST.cb} = ?</span>
      <button class="cap-ref" onclick="genCaptcha();render()">↻</button>
    </div>
    <input id="lcap" type="number" placeholder="Answer" style="margin-top:8px">
    <button class="btn green" onclick="doLogin()">Login →</button>`;
}

function regForm() {
  const isI = ST.role === 'instructor';
  return `
    <label>Choose a Unique ID</label>
    <input id="rid" type="text" placeholder="e.g. roll number, INST01" autocomplete="off">
    <label>Full Name</label>
    <input id="rname" type="text" placeholder="Your full name">
    <label>Password</label>
    <input id="rpwd" type="password" placeholder="Choose a password">
    <label>Confirm Password</label>
    <input id="rpwd2" type="password" placeholder="Repeat password">
    <label>${isI ? 'Instructor Registration Code' : 'Instructor / Group Code'}</label>
    <input id="icode" type="text" placeholder="${isI ? 'Your unique instructor code' : 'Code given by your instructor'}">
    <div style="font-size:12px;color:var(--muted);margin-top:5px">
      ${isI ? 'Each code can only be used once to register as instructor.' : 'Enter the code provided by your instructor to join their group.'}
    </div>
    <button class="btn green" onclick="doReg()">Create Account</button>`;
}

// ══════════════════════════════════════════════
// STUDENT DASHBOARD
// ══════════════════════════════════════════════
function studDash() {
  const u = ST.user;
  const instr = DB.users[u.instructorId];
  const closed = DB.sessions.filter(s => s.instructorId === u.instructorId && s.closed);
  const statuses = closed.map(s => (s.attendance || {})[u.id]);
  const present = statuses.filter(x => x === 'present').length;
  const absent  = statuses.filter(x => x === 'absent').length;
  const medical = statuses.filter(x => x === 'medical').length;
  const counted = present + absent;
  const pct     = counted ? Math.round(present / counted * 100) : 0;
  const pctCol  = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
  const nccHrs  = calcNccHours(u.id, u.instructorId);

  return `<div class="card">
    <button class="back-btn" onclick="logout()">← Logout</button>
    <div class="ctitle">${u.name}</div>
    <div class="csub">ID: <strong>${u.id}</strong>${instr ? ' · ' + instr.name : ''}</div>

    <div class="stat-grid">
      <div class="stat"><div class="stat-num" style="color:var(--green)">${present}</div><div class="stat-lbl">Present</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--red)">${absent}</div><div class="stat-lbl">Absent</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--blue-d)">${medical}</div><div class="stat-lbl">Medical</div></div>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:${pctCol}"></div></div>
    <div class="plbl">${pct >= 75 ? '✅' : '⚠️'} ${pct}% attendance (medical leave not counted)</div>

    <div style="background:var(--surface);border-radius:var(--rsm);padding:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="font-size:13px;color:var(--muted);font-weight:500">Total NCC Hours</div>
      <div style="font-size:22px;font-weight:700;color:${nccHrs >= 0 ? 'var(--green-d)' : 'var(--red-d)'}">${nccHrs >= 0 ? '+' : ''}${nccHrs} hrs</div>
    </div>

    <button class="btn blue" onclick="ST.studSubscreen='verify';render()">🔍 Verify Attendance</button>

    <hr class="divider">
    <div class="stitle">Recent Sessions</div>
    ${closed.length === 0 ? `<div class="no-data">No sessions recorded yet.</div>` : `
    <div class="slist">
      ${closed.slice().reverse().slice(0, 10).map(s => {
        const st = (s.attendance || {})[u.id] || null;
        const h  = s.hours || 0;
        const hDelta = st === 'present' ? +h : st === 'absent' ? -h : 0;
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
          <div>
            <div style="font-size:14px;font-weight:500">${s.title}</div>
            <div style="font-size:12px;color:var(--muted)">${s.date} ${s.time ? '· ' + s.time : ''} · ${s.dayName}</div>
          </div>
          <div style="text-align:right">
            ${st ? `<span class="badge ${st}">${st === 'present' ? '✓ Present' : st === 'absent' ? '✗ Absent' : '⚕ Medical'}</span>` : '<span style="font-size:12px;color:var(--faint)">—</span>'}
            ${hDelta !== 0 ? `<div style="font-size:11px;color:${hDelta > 0 ? 'var(--green-d)' : 'var(--red-d)'};margin-top:3px;font-weight:600">${hDelta > 0 ? '+' : ''}${hDelta} hrs</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

// ══════════════════════════════════════════════
// STUDENT VERIFY
// ══════════════════════════════════════════════
function studVerify() {
  const u = ST.user;
  const closed = DB.sessions.filter(s => s.instructorId === u.instructorId && s.closed);
  const statuses = closed.map(s => (s.attendance || {})[u.id]);
  const present = statuses.filter(x => x === 'present').length;
  const absent  = statuses.filter(x => x === 'absent').length;
  const medical = statuses.filter(x => x === 'medical').length;
  const counted = present + absent;
  const pct     = counted ? Math.round(present / counted * 100) : 0;
  const pctCol  = pct >= 75 ? 'var(--green)' : pct >= 50 ? 'var(--amber)' : 'var(--red)';
  const nccHrs  = calcNccHours(u.id, u.instructorId);

  return `<div class="card">
    <button class="back-btn" onclick="ST.studSubscreen='dash';render()">← Back</button>
    <div class="pct-big" style="color:${pctCol}">${pct}%</div>
    <div class="pct-lbl">Attendance Rate · Medical leave not counted in %</div>

    <div class="stat-grid">
      <div class="stat"><div class="stat-num" style="color:var(--green)">${present}</div><div class="stat-lbl">Present</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--red)">${absent}</div><div class="stat-lbl">Absent</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--blue-d)">${medical}</div><div class="stat-lbl">Medical</div></div>
    </div>

    <div style="background:var(--surface);border-radius:var(--rsm);padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem">
      <span style="font-size:13px;color:var(--muted);font-weight:500">Total NCC Hours</span>
      <span style="font-size:20px;font-weight:700;color:${nccHrs >= 0 ? 'var(--green-d)' : 'var(--red-d)'}">${nccHrs >= 0 ? '+' : ''}${nccHrs} hrs</span>
    </div>

    ${pct < 75 ? `<div class="msg-box err" style="margin-bottom:12px">⚠️ Below 75% attendance threshold.</div>` : ''}

    <hr class="divider">
    <div class="stitle">All Sessions — Date &amp; Time Wise</div>
    ${closed.length === 0 ? `<div class="no-data">No sessions yet.</div>` : `
    <div class="slist" style="max-height:480px">
      ${closed.slice().reverse().map(s => {
        const st   = (s.attendance || {})[u.id] || null;
        const cls  = st || '';
        const h    = s.hours || 0;
        const hD   = st === 'present' ? +h : st === 'absent' ? -h : 0;
        return `<div class="att-entry ${cls}">
          <div class="att-dot"></div>
          <div class="att-info">
            <div class="att-date">${s.date}${s.time ? ' · ' + s.time : ''} — ${s.dayName}</div>
            <div class="att-sess">${s.title}</div>
          </div>
          <div class="att-right">
            <div class="att-status">${st === 'present' ? '✓ Present' : st === 'absent' ? '✗ Absent' : st === 'medical' ? '⚕ Medical' : 'Not marked'}</div>
            ${hD !== 0 ? `<div class="att-hrs">${hD > 0 ? '+' : ''}${hD} hrs</div>` : ''}
          </div>
        </div>`;
      }).join('')}
    </div>`}
  </div>`;
}

// ══════════════════════════════════════════════
// INSTRUCTOR DASHBOARD
// ══════════════════════════════════════════════
function instrDash() {
  const u = ST.user;
  const myStudents = Object.values(DB.users).filter(x => x.role === 'student' && x.instructorId === u.id);
  const closed     = DB.sessions.filter(s => s.instructorId === u.id && s.closed);
  const active     = (DB.active || {})[u.id];

  return `<div class="card">
    <button class="back-btn" onclick="logout()">← Logout${active && !active.closed ? ' (auto-saves session)' : ''}</button>
    <div class="ctitle">📋 ${u.name}</div>
    <div class="csub">Instructor · ${myStudents.length} students · ${closed.length} sessions</div>

    <div class="inav">
      <button class="inav-btn ${ST.instrPanel==='mark'?'sel-mark':''}" onclick="setPanel('mark')">
        <div class="icon">✏️</div><div class="lbl">Mark Attendance</div>
      </button>
      <button class="inav-btn ${ST.instrPanel==='check'?'sel-check':''}" onclick="setPanel('check')">
        <div class="icon">📅</div><div class="lbl">Check Attendance</div>
      </button>
      <button class="inav-btn ${ST.instrPanel==='ncc'?'sel-ncc':''}" onclick="setPanel('ncc')">
        <div class="icon">⏱️</div><div class="lbl">NCC Hours</div>
      </button>
    </div>

    ${ST.instrPanel === 'mark'  ? markPanel(active, myStudents)
    : ST.instrPanel === 'check' ? checkPanel(closed, myStudents)
    : nccPanel(myStudents, u.id)}
  </div>`;
}

// ══════════════════════════════════════════════
// MARK ATTENDANCE PANEL
// ══════════════════════════════════════════════
function markPanel(active, myStudents) {
  // Marking in progress
  if (active && !active.closed) {
    const q        = ST.markSearch.toLowerCase();
    const filtered = myStudents.filter(s => !q || s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q));
    const att      = active.attendance || {};
    const pC = Object.values(att).filter(x => x === 'present').length;
    const aC = Object.values(att).filter(x => x === 'absent').length;
    const mC = Object.values(att).filter(x => x === 'medical').length;

    return `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">
            <span class="live-dot"></span>Live Session
          </div>
          <div style="font-size:15px;font-weight:700">${active.title}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${active.date} · ${active.time} · ${active.dayName}</div>
        </div>
        <div style="font-size:12px;color:var(--muted);text-align:right;flex-shrink:0">
          ✅ ${pC} &nbsp; ❌ ${aC} &nbsp; 💙 ${mC}
        </div>
      </div>

      <div style="font-size:12px;color:var(--muted);padding:8px 12px;background:var(--surface);border-radius:var(--rsm);margin-bottom:10px">
        🟢 = Present &nbsp;&nbsp; 🔴 = Absent &nbsp;&nbsp; 🔵 = Medical Leave
      </div>

      <div class="srch">
        <input type="text" placeholder="🔍 Search student…" value="${ST.markSearch}" oninput="ST.markSearch=this.value;render()">
      </div>

      ${myStudents.length === 0
        ? `<div class="info-box">No students registered under you yet.</div>`
        : `<div class="slist" style="max-height:280px">
            ${filtered.map(s => {
              const status = att[s.id] || null;
              const cls = status ? 'i' + status[0] : '';
              return `<div class="stu-item ${cls}">
                <div class="stu-info">
                  <div class="stu-name">${s.name}</div>
                  <div class="stu-id">${s.id}</div>
                </div>
                ${status ? `<span class="slbl ${status}">${status === 'present' ? 'Present' : status === 'absent' ? 'Absent' : 'Medical'}</span>` : ''}
                <div class="stu-btns">
                  <button class="sb ${status==='present'?'sp':''}" onclick="setStatus('${s.id}','present')" title="Present">🟢</button>
                  <button class="sb ${status==='absent'?'sa':''}" onclick="setStatus('${s.id}','absent')" title="Absent">🔴</button>
                  <button class="sb ${status==='medical'?'sm2':''}" onclick="setStatus('${s.id}','medical')" title="Medical">🔵</button>
                </div>
              </div>`;
            }).join('')}
          </div>`}

      <div class="hours-box">
        <div class="ht">⏱️ NCC Hours for this Session</div>
        <div class="hi">Enter hours for this session. Present students get +hours, absent get −hours, medical gets 0.</div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" id="sess-hours" min="0" max="24" step="0.5" placeholder="e.g. 3" value="${active.hours || ''}" style="width:100px" oninput="updateHours(this.value)">
          <span style="font-size:13px;color:var(--muted)">hours</span>
        </div>
      </div>

      <div class="btn-row" style="margin-top:14px">
        <button class="btn red" onclick="leaveWithoutMarking()">Leave Without Marking</button>
        <button class="btn green" onclick="saveSession()">${ST.saving ? '<span class="spinner"></span>Saving…' : '💾 Save Attendance'}</button>
      </div>
      ${ST.msg ? `<div class="msg-box ${ST.msgType}" style="margin-top:8px">${ST.msg}</div>` : ''}
    `;
  }

  // No active session
  return `
    <div class="stitle">Start New Attendance Session</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:10px">
      Enter a session title. Date, time and day are captured automatically when you start.
    </div>
    <label>Session Title</label>
    <input id="stitle" type="text" placeholder="e.g. Morning Parade · Week 5">
    ${ST.msg ? `<div class="msg-box ${ST.msgType}">${ST.msg}</div>` : ''}
    <button class="btn green" onclick="startSession()">▶ Start Session</button>
  `;
}

// ══════════════════════════════════════════════
// CHECK ATTENDANCE PANEL (with Edit)
// ══════════════════════════════════════════════
function checkPanel(closed, myStudents) {
  const q = ST.checkSearch.toLowerCase();
  if (closed.length === 0) return `<div class="stitle">Check Attendance</div><div class="no-data">No completed sessions yet.</div>`;

  const visibleSessions = closed.filter(s => !q || s.title.toLowerCase().includes(q) || s.date.includes(q) || s.dayName.toLowerCase().includes(q)).slice().reverse();

  return `
    <div class="stitle">Check Attendance — ${closed.length} Sessions</div>
    <div class="srch">
      <input type="text" placeholder="🔍 Search by title, date or day…" value="${ST.checkSearch}" oninput="ST.checkSearch=this.value;render()">
    </div>
    <div class="slist">
      ${visibleSessions.map(s => {
        const att   = s.attendance || {};
        const pC    = Object.values(att).filter(x => x === 'present').length;
        const aC    = Object.values(att).filter(x => x === 'absent').length;
        const mC    = Object.values(att).filter(x => x === 'medical').length;
        const open  = ST.expandedDays[s.id];
        const isEditing = ST.editingSessionId === s.id;

        return `<div class="day-card">
          <div class="day-head" onclick="toggleDay('${s.id}')">
            <div>
              <div style="font-size:14px;font-weight:600">${s.date}${s.time ? ' · ' + s.time : ''} <span style="font-size:12px;font-weight:400;color:var(--muted)">${s.dayName}</span></div>
              <div style="font-size:12px;color:var(--muted);margin-top:2px">${s.title}${s.hours ? ' · ' + s.hours + ' hrs NCC' : ''}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="badge present">✓${pC}</span>
              <span class="badge absent">✗${aC}</span>
              <span class="badge medical">⚕${mC}</span>
              <span style="font-size:12px;color:var(--muted)">${open ? '▲' : '▼'}</span>
            </div>
          </div>

          ${open ? `<div class="day-body open">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
              <span style="font-size:12px;color:var(--muted)">${myStudents.length} students</span>
              <button class="btn sm ${isEditing ? 'green' : ''}" onclick="toggleEdit('${s.id}');event.stopPropagation()">
                ${isEditing ? '✓ Done Editing' : '✏️ Edit'}
              </button>
            </div>

            ${isEditing ? `
              <div style="font-size:12px;color:var(--muted);margin-bottom:8px;padding:6px 10px;background:var(--amber-l);border-radius:6px;color:var(--amber-t)">
                Tap 🟢🔴🔵 to change status. Hours auto-update. Changes save immediately.
              </div>` : ''}

            ${myStudents.length === 0 ? '<div class="no-data">No students.</div>' :
              myStudents.map(st => {
                const status = att[st.id] || null;
                const h = parseFloat(s.hours) || 0;
                const hD = status === 'present' ? +h : status === 'absent' ? -h : 0;
                return `<div class="day-stu-row">
                  <div>
                    <span style="font-weight:500">${st.name}</span>
                    <span style="font-size:12px;color:var(--muted);margin-left:6px">${st.id}</span>
                    ${hD !== 0 ? `<span style="font-size:11px;color:${hD>0?'var(--green-d)':'var(--red-d)'};margin-left:6px;font-weight:600">${hD>0?'+':''}${hD}h</span>` : ''}
                  </div>
                  <div style="display:flex;align-items:center;gap:6px">
                    ${status ? `<span class="badge ${status}">${status==='present'?'✓ Present':status==='absent'?'✗ Absent':'⚕ Medical'}</span>` : '<span style="font-size:12px;color:var(--faint)">Not marked</span>'}
                    ${isEditing ? `
                      <div style="display:flex;gap:3px">
                        <button class="eb ${status==='present'?'ep':''}" onclick="editStatus('${s.id}','${st.id}','present')" title="Present">🟢</button>
                        <button class="eb ${status==='absent'?'ea':''}" onclick="editStatus('${s.id}','${st.id}','absent')" title="Absent">🔴</button>
                        <button class="eb ${status==='medical'?'em':''}" onclick="editStatus('${s.id}','${st.id}','medical')" title="Medical">🔵</button>
                      </div>` : ''}
                  </div>
                </div>`;
              }).join('')}
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}

// ══════════════════════════════════════════════
// NCC HOURS PANEL
// ══════════════════════════════════════════════
function nccPanel(myStudents, instrId) {
  const q      = ST.nccSearch.toLowerCase();
  const sorted = [...myStudents]
    .filter(s => !q || s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q))
    .sort((a, b) => calcNccHours(b.id, instrId) - calcNccHours(a.id, instrId));

  return `
    <div class="stitle">NCC Hours — All Students</div>
    <div class="srch">
      <input type="text" placeholder="🔍 Search student…" value="${ST.nccSearch}" oninput="ST.nccSearch=this.value;render()">
    </div>
    ${myStudents.length === 0 ? `<div class="no-data">No students registered under you yet.</div>` : `
    <div class="slist">
      ${sorted.map((s, i) => {
        const hrs = calcNccHours(s.id, instrId);
        return `<div class="ncc-row">
          <div>
            <div style="font-weight:500;font-size:14px">${s.name}</div>
            <div style="font-size:12px;color:var(--muted)">${s.id}</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:${hrs > 0 ? 'var(--green-d)' : hrs < 0 ? 'var(--red-d)' : 'var(--muted)'}">${hrs >= 0 ? '+' : ''}${hrs} hrs</div>
        </div>`;
      }).join('')}
    </div>`}`;
}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function setRole(r) { ST.role = r; ST.msg = ''; render(); }
function setTab(t)  { ST.tab  = t; ST.msg = ''; render(); }
function setPanel(p){ ST.instrPanel = p; ST.msg = ''; render(); }

async function doLogin() {
  const id  = val('lid');
  const pwd = val('lpwd');
  const cap = parseInt(val('lcap'));
  if (!id || !pwd) return msg('Please fill all fields.');
  if (cap !== ST.ca + ST.cb) { genCaptcha(); return msg('Captcha incorrect. Try again.'); }

  // Always re-sync from cloud before login so mobile sees laptop data
  showSync('loading');
  await loadDB();
  hideSync();

  const u = DB.users[id];
  if (!u || u.password !== pwd) return msg('Wrong ID or password.');
  if (ST.role === 'instructor' && u.role !== 'instructor') return msg('This ID is not an instructor account.');
  if (ST.role === 'student'    && u.role !== 'student')    return msg('This ID is not a student account.');

  ST.user = u; ST.screen = 'dash'; ST.msg = ''; ST.instrPanel = 'mark'; ST.studSubscreen = 'dash';
  render();
}

async function doReg() {
  const id   = val('rid');
  const name = val('rname');
  const pwd  = val('rpwd');
  const pwd2 = val('rpwd2');
  const code = val('icode').trim();
  if (!id || !name || !pwd || !pwd2 || !code) return msg('Please fill all fields.');
  if (pwd !== pwd2)  return msg('Passwords do not match.');
  if (id.length < 3) return msg('ID must be at least 3 characters.');

  // Sync from cloud first so we always have latest data before registering
  showSync('loading');
  await loadDB();
  hideSync();

  if (DB.users[id]) return msg(`ID "${id}" is already taken.`);

  const entry = findCode(code);
  if (!entry) return msg('Invalid code. Please check and try again.');

  if (ST.role === 'instructor') {
    if (entry.instructorId !== null) return msg('This code has already been used by an instructor. Each code can only register one instructor. Use a different INST code.');
    DB.users[id] = { id, name, password: pwd, role: 'instructor', instructorId: id };
    entry.instructorId = id;  // mutates DB.codes directly — saved atomically below
    await saveDB();
    msg('Instructor account created! You can now login.', 'ok');
    setTimeout(() => { ST.tab = 'login'; ST.msg = ''; render(); }, 1500);
  } else {
    if (entry.instructorId === null) return msg('This code has not been claimed by an instructor yet. Ask your instructor to register first.');
    DB.users[id] = { id, name, password: pwd, role: 'student', instructorId: entry.instructorId };
    await saveDB();
    msg('Account created! You can now login.', 'ok');
    setTimeout(() => { ST.tab = 'login'; ST.msg = ''; render(); }, 1500);
  }
}

function startSession() {
  const title = val('stitle');
  if (!title) return msg('Please enter a session title.');
  const now     = new Date();
  const days    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = days[now.getDay()];
  const date    = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  const time    = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
  if (!DB.active) DB.active = {};
  DB.active[ST.user.id] = {
    id: Date.now(), title, date, time, dayName,
    instructorId: ST.user.id,
    attendance: {}, hours: 0, closed: false
  };
  saveDB();
  ST.msg = ''; render();
}

function setStatus(stuId, status) {
  const active = (DB.active || {})[ST.user.id];
  if (!active || active.closed) return;
  if (!active.attendance) active.attendance = {};
  if (active.attendance[stuId] === status) delete active.attendance[stuId];
  else active.attendance[stuId] = status;
  saveDB(); render();
}

function updateHours(val) {
  const active = (DB.active || {})[ST.user.id];
  if (!active) return;
  active.hours = parseFloat(val) || 0;
  DB.active[ST.user.id] = active;
  // Don't re-render, just update in memory (input is live)
  saveDB();
}

async function saveSession() {
  const active = (DB.active || {})[ST.user.id];
  if (!active) return;
  // Read hours input fresh
  const hInput = document.getElementById('sess-hours');
  if (hInput) active.hours = parseFloat(hInput.value) || 0;
  active.closed = true;
  if (!DB.sessions) DB.sessions = [];
  DB.sessions.push({ ...active });
  DB.active[ST.user.id] = null;
  ST.saving = true; render();
  await saveDB();
  ST.saving = false;
  msg('Attendance saved!', 'ok');
  render();
}

function leaveWithoutMarking() {
  DB.active[ST.user.id] = null;
  saveDB();
  ST.msg = ''; render();
}

function toggleDay(id) { ST.expandedDays[id] = !ST.expandedDays[id]; render(); }

function toggleEdit(sessionId) {
  if (ST.editingSessionId === sessionId) {
    ST.editingSessionId = null;
  } else {
    ST.editingSessionId = sessionId;
  }
  render();
}

async function editStatus(sessionId, stuId, newStatus) {
  const sessIdx = DB.sessions.findIndex(s => s.id == sessionId);
  if (sessIdx === -1) return;
  const sess = DB.sessions[sessIdx];
  if (!sess.attendance) sess.attendance = {};
  if (sess.attendance[stuId] === newStatus) delete sess.attendance[stuId];
  else sess.attendance[stuId] = newStatus;
  DB.sessions[sessIdx] = sess;
  await saveDB();
  render();
}

async function logout() {
  if (ST.user && ST.user.role === 'instructor') {
    const active = (DB.active || {})[ST.user.id];
    if (active && !active.closed) {
      // Auto-save on logout
      active.closed = true;
      if (!DB.sessions) DB.sessions = [];
      DB.sessions.push({ ...active });
      DB.active[ST.user.id] = null;
      await saveDB();
    }
  }
  ST.screen = 'home'; ST.user = null; ST.msg = '';
  ST.markSearch = ''; ST.checkSearch = ''; ST.nccSearch = '';
  ST.studSubscreen = 'dash'; ST.editingSessionId = null;
  render();
}

function msg(m, type = 'err') { ST.msg = m; ST.msgType = type; render(); }
function val(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }

function bindAll() {
  [['lid', doLogin], ['lpwd', doLogin], ['lcap', doLogin],
   ['rid', doReg], ['rname', doReg], ['rpwd', doReg], ['rpwd2', doReg], ['icode', doReg],
   ['stitle', startSession]
  ].forEach(([id, fn]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') fn(); });
  });
}

genCaptcha();
document.getElementById('root').innerHTML = `<div class="card"><div class="sync-bar"><span class="spinner"></span>Loading from cloud…</div></div>`;
loadDB().then(() => render());
</script>
