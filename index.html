<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1D9E75;
    --green-dark: #0F6E56;
    --green-light: #E1F5EE;
    --green-border: #5DCAA5;
    --blue: #378ADD;
    --blue-dark: #185FA5;
    --blue-light: #E6F1FB;
    --red: #E24B4A;
    --red-dark: #A32D2D;
    --red-light: #FCEBEB;
    --amber-light: #FAEEDA;
    --amber-border: #EF9F27;
    --amber-text: #633806;
    --bg: #F7F6F2;
    --card: #FFFFFF;
    --border: rgba(0,0,0,0.10);
    --border-md: rgba(0,0,0,0.18);
    --text: #1A1A1A;
    --text-muted: #6B6B6B;
    --text-faint: #9A9A9A;
    --surface: #F0EFE9;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }
  .app { max-width: 500px; margin: 0 auto; }

  /* Header */
  .app-header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .app-header .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
  }
  .app-header h1 {
    font-size: 22px; font-weight: 600; color: var(--text);
  }
  .app-header p {
    font-size: 13px; color: var(--text-muted);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Role toggle */
  .role-toggle {
    display: flex; gap: 8px; margin-bottom: 1.5rem;
  }
  .role-btn {
    flex: 1; padding: 9px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .role-btn:hover { border-color: var(--border-md); }
  .role-btn.active {
    background: var(--blue-light);
    border-color: var(--blue);
    color: var(--blue-dark);
  }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .tab {
    flex: 1; padding: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .tab.active {
    background: var(--green-light);
    border-color: var(--green-border);
    color: var(--green-dark);
  }

  /* Section header */
  .card-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 1.4rem; }

  /* Form */
  label {
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.4px;
    display: block; margin-bottom: 5px; margin-top: 14px;
  }
  input {
    width: 100%; padding: 10px 13px;
    border: 1px solid var(--border-md);
    border-radius: var(--radius-sm);
    font-size: 14px; font-family: inherit;
    background: #fff; color: var(--text);
    transition: border-color 0.15s;
  }
  input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
  input.mono { font-family: 'DM Mono', monospace; letter-spacing: 4px; font-size: 20px; text-align: center; text-transform: uppercase; }

  /* Buttons */
  .btn {
    width: 100%; padding: 11px;
    margin-top: 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-md);
    background: #fff; color: var(--text);
    font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--surface); }
  .btn.green { background: var(--green); border-color: var(--green-dark); color: #fff; }
  .btn.green:hover { background: var(--green-dark); }
  .btn.red { border-color: #F09595; color: var(--red-dark); }
  .btn.red:hover { background: var(--red-light); }
  .btn.sm { width: auto; padding: 7px 16px; margin-top: 0; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  .btn-row .btn { margin-top: 0; }

  /* Captcha */
  .captcha-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 13px 16px;
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px;
  }
  .captcha-q {
    font-family: 'DM Mono', monospace;
    font-size: 20px; font-weight: 500;
    letter-spacing: 3px; color: var(--text);
  }
  .captcha-refresh {
    background: none; border: none;
    font-size: 22px; cursor: pointer;
    color: var(--text-muted); line-height: 1;
    padding: 2px;
    transition: transform 0.3s;
  }
  .captcha-refresh:hover { transform: rotate(180deg); color: var(--text); }

  /* Feedback */
  .err { color: var(--red-dark); font-size: 12px; margin-top: 8px; padding: 8px 12px; background: var(--red-light); border-radius: 6px; }
  .ok  { color: var(--green-dark); font-size: 12px; margin-top: 8px; padding: 8px 12px; background: var(--green-light); border-radius: 6px; }

  /* Divider */
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.4rem 0; }

  /* Section title */
  .section-title {
    font-size: 11px; font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.7px;
    margin-bottom: 12px;
  }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.2rem; }
  .stat {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 14px; text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Progress */
  .progress-bar { height: 6px; border-radius: 3px; background: var(--surface); overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s ease; }
  .progress-label { font-size: 12px; color: var(--text-muted); margin-top: 5px; margin-bottom: 1.4rem; }

  /* Code badge */
  .code-box {
    background: var(--green-light);
    border: 1px solid var(--green-border);
    border-radius: var(--radius-sm);
    padding: 20px; text-align: center;
    margin: 14px 0;
  }
  .code-val {
    font-family: 'DM Mono', monospace;
    font-size: 40px; font-weight: 500;
    letter-spacing: 10px; color: var(--green-dark);
  }
  .code-lbl { font-size: 12px; color: var(--green); margin-top: 8px; }

  /* Expired / warning */
  .expired-box {
    background: var(--red-light);
    border: 1px solid #F09595;
    border-radius: var(--radius-sm);
    padding: 14px; text-align: center;
    margin: 12px 0;
  }
  .expired-box .etitle { font-size: 14px; font-weight: 500; color: var(--red-dark); margin-bottom: 4px; }
  .expired-box .esub { font-size: 12px; color: var(--red-dark); opacity: 0.8; }

  .info-box {
    background: var(--amber-light);
    border: 1px solid var(--amber-border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px; color: var(--amber-text);
    margin-bottom: 14px;
  }

  /* Rows */
  .att-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .att-row:last-child { border-bottom: none; }
  .att-row .row-title { font-size: 14px; color: var(--text); }
  .att-row .row-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .student-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .student-row:last-child { border-bottom: none; }

  /* Badges */
  .badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .badge.present { background: var(--green-light); color: var(--green-dark); }
  .badge.absent  { background: var(--surface); color: var(--text-muted); }
  .badge.blue    { background: var(--blue-light); color: var(--blue-dark); }

  /* Back button */
  .back-btn {
    background: none; border: none;
    font-size: 13px; color: var(--text-muted);
    cursor: pointer; font-family: inherit;
    padding: 0; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 4px;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }

  /* Filter tabs */
  .filter-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .filter-tab {
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px; font-weight: 500;
    cursor: pointer; font-family: inherit;
    background: var(--surface); color: var(--text-muted);
    transition: all 0.15s;
  }
  .filter-tab.active {
    background: var(--green-light);
    border-color: var(--green-border);
    color: var(--green-dark);
  }

  /* Search */
  .search-wrap { margin-bottom: 12px; }
  .search-wrap input { margin-top: 0; }

  /* No data */
  .no-data { font-size: 13px; color: var(--text-muted); padding: 8px 0; }

  /* Animate in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp 0.25s ease; }

  /* Scrollable list */
  .scroll-list { max-height: 360px; overflow-y: auto; }
  .scroll-list::-webkit-scrollbar { width: 4px; }
  .scroll-list::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">
  <div class="app-header">
    <div class="logo">
      <div class="logo-icon">&#10003;</div>
      <h1>AttendEase</h1>
    </div>
    <p>Smart attendance tracking for classrooms</p>
  </div>
  <div id="root"></div>
</div>

<script>
const INST_SECRET = 'INST2024';

const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem('ae3_' + k)); } catch { return null; } },
  set(k, v) { localStorage.setItem('ae3_' + k, JSON.stringify(v)); }
};

let DB = {
  users:    LS.get('users')    || {},
  sessions: LS.get('sessions') || [],
  active:   LS.get('active')   || null
};

function saveDB() {
  LS.set('users',    DB.users);
  LS.set('sessions', DB.sessions);
  LS.set('active',   DB.active);
}

let ST = {
  screen: 'home', role: 'student', tab: 'login',
  user: null, msg: '', msgOk: false,
  ca: 0, cb: 0, search: '', histFilter: 'all'
};

function genCaptcha() {
  ST.ca = Math.floor(Math.random() * 12) + 1;
  ST.cb = Math.floor(Math.random() * 12) + 1;
}

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
  return c;
}

function render() {
  document.getElementById('root').innerHTML = buildView();
  bindAll();
}

function buildView() {
  if (ST.screen === 'dash') return ST.user.role === 'instructor' ? instrDash() : studDash();
  return homeView();
}

/* ── HOME ── */
function homeView() {
  return `
  <div class="card">
    <div class="role-toggle">
      <button class="role-btn ${ST.role==='student'?'active':''}" onclick="setRole('student')">&#x1F393; Student</button>
      <button class="role-btn ${ST.role==='instructor'?'active':''}" onclick="setRole('instructor')">&#x1F4CB; Instructor</button>
    </div>
    <div class="card-title">${ST.role === 'instructor' ? 'Instructor Portal' : 'Student Portal'}</div>
    <div class="card-sub">${ST.role === 'instructor' ? 'Start sessions and track class attendance' : 'Mark and view your attendance record'}</div>
    <div class="tabs">
      <button class="tab ${ST.tab==='login'?'active':''}" onclick="setTab('login')">Login</button>
      <button class="tab ${ST.tab==='reg'?'active':''}" onclick="setTab('reg')">Register</button>
    </div>
    ${ST.tab === 'login' ? loginForm() : regForm()}
    ${ST.msg ? `<div class="${ST.msgOk ? 'ok' : 'err'}">${ST.msg}</div>` : ''}
  </div>`;
}

function loginForm() {
  return `
    <label>Your ID</label>
    <input id="lid" type="text" placeholder="Enter your student or instructor ID" autocomplete="off">
    <label>Password</label>
    <input id="lpwd" type="password" placeholder="Enter your password">
    <label>Captcha &mdash; solve to continue</label>
    <div class="captcha-box">
      <span class="captcha-q">${ST.ca} + ${ST.cb} = ?</span>
      <button class="captcha-refresh" onclick="genCaptcha();render()" title="New captcha">&#8635;</button>
    </div>
    <input id="lcap" type="number" placeholder="Your answer" style="margin-top:8px">
    <button class="btn green" onclick="doLogin()">Login &rarr;</button>`;
}

function regForm() {
  return `
    <label>Choose a Unique ID</label>
    <input id="rid" type="text" placeholder="e.g. STU001, roll number, or email prefix" autocomplete="off">
    <label>Full Name</label>
    <input id="rname" type="text" placeholder="Your full name">
    <label>Password</label>
    <input id="rpwd" type="password" placeholder="Choose a strong password">
    <label>Confirm Password</label>
    <input id="rpwd2" type="password" placeholder="Repeat your password">
    ${ST.role === 'instructor' ? `
      <label>Instructor Secret Code</label>
      <input id="isec" type="text" placeholder="Get this from your admin">
      <div style="font-size:12px;color:var(--text-muted);margin-top:5px">Contact your administrator for the instructor secret code.</div>
    ` : ''}
    <button class="btn green" onclick="doReg()">Create Account</button>`;
}

/* ── STUDENT DASHBOARD ── */
function studDash() {
  const u = ST.user;
  const closed   = DB.sessions.filter(s => s.closed);
  const attended = closed.filter(s => s.marked.includes(u.id));
  const pct      = closed.length ? Math.round(attended.length / closed.length * 100) : 0;
  const active   = DB.active;
  const alreadyMarked = active && active.marked.includes(u.id);

  const filtered =
    ST.histFilter === 'present' ? closed.filter(s =>  s.marked.includes(u.id)) :
    ST.histFilter === 'absent'  ? closed.filter(s => !s.marked.includes(u.id)) : closed;

  return `
  <div class="card">
    <button class="back-btn" onclick="logout()">&#8592; Logout</button>
    <div class="card-title">${u.name}</div>
    <div class="card-sub">ID: <strong>${u.id}</strong> &nbsp;&middot;&nbsp; Student</div>

    <div class="stat-grid">
      <div class="stat"><div class="stat-num">${attended.length}</div><div class="stat-lbl">Attended</div></div>
      <div class="stat"><div class="stat-num">${closed.length}</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-lbl">Rate</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${pct >= 75 ? '&#x2705;' : '&#x26A0;&#xFE0F;'} ${pct}% attendance ${pct < 75 ? '&mdash; below 75% threshold' : ''}</div>

    <hr class="divider">
    <div class="section-title">Mark Today&rsquo;s Attendance</div>

    ${active && !active.closed
      ? alreadyMarked
        ? `<div class="ok" style="font-size:13px">&#x2713; You already marked attendance for &ldquo;${active.title}&rdquo;</div>`
        : `<p style="font-size:13px;color:var(--text-muted);margin-bottom:10px">A session is live. Enter the 6-character code from your instructor.</p>
           <input id="scode" class="mono" type="text" placeholder="- - - - - -" maxlength="6">
           ${ST.msg ? `<div class="${ST.msgOk ? 'ok' : 'err'}">${ST.msg}</div>` : ''}
           <button class="btn green" onclick="markAtt()">Mark Attendance</button>`
      : `<div class="expired-box">
           <div class="etitle">&#x23F0; No active session</div>
           <div class="esub">Wait for your instructor to start a session. Codes expire immediately when the instructor ends the session or logs out.</div>
         </div>`
    }

    <hr class="divider">
    <div class="section-title">Session History (${closed.length} sessions)</div>
    <div class="filter-tabs">
      ${['all','present','absent'].map(f =>
        `<button class="filter-tab ${ST.histFilter===f?'active':''}" onclick="ST.histFilter='${f}';render()">${f.charAt(0).toUpperCase()+f.slice(1)}</button>`
      ).join('')}
    </div>
    ${filtered.length === 0
      ? `<div class="no-data">No sessions to show.</div>`
      : `<div class="scroll-list">${filtered.slice().reverse().map(s => `
          <div class="att-row">
            <div>
              <div class="row-title">${s.title}</div>
              <div class="row-sub">${s.date} &middot; ${s.marked.length} present</div>
            </div>
            ${s.marked.includes(u.id) ? '<span class="badge present">Present</span>' : '<span class="badge absent">Absent</span>'}
          </div>`).join('')}
        </div>`
    }
  </div>`;
}

/* ── INSTRUCTOR DASHBOARD ── */
function instrDash() {
  const u = ST.user;
  const active    = DB.active;
  const closed    = DB.sessions.filter(s => s.closed);
  const allStudents = Object.values(DB.users).filter(x => x.role === 'student');
  const q = ST.search.toLowerCase();
  const filtered  = allStudents.filter(s => !q || s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q));

  return `
  <div class="card">
    <button class="back-btn" onclick="logout()">&#8592; Logout <span style="font-size:11px;margin-left:4px;color:var(--red-dark)">(ends active session)</span></button>
    <div class="card-title">&#x1F4CB; ${u.name}</div>
    <div class="card-sub">Instructor &mdash; manage sessions and track attendance</div>

    <div class="stat-grid">
      <div class="stat"><div class="stat-num">${allStudents.length}</div><div class="stat-lbl">Students</div></div>
      <div class="stat"><div class="stat-num">${closed.length}</div><div class="stat-lbl">Sessions</div></div>
      <div class="stat"><div class="stat-num" style="color:${active&&!active.closed?'var(--green)':'var(--text-muted)'}">${active && !active.closed ? active.marked.length : '&mdash;'}</div><div class="stat-lbl">Live count</div></div>
    </div>

    <hr class="divider">

    ${active && !active.closed ? `
      <div class="section-title">&#x1F7E2; Active Session</div>
      <div style="font-size:15px;font-weight:500;margin-bottom:6px">${active.title}</div>
      <div class="code-box">
        <div class="code-val">${active.code}</div>
        <div class="code-lbl">Share this code with students &mdash; it expires when you end the session or logout</div>
      </div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">${active.marked.length} student(s) marked present so far</div>
      <button class="btn red" onclick="endSession()">&#x23F9; End Session &amp; Expire Code</button>
    ` : `
      <div class="section-title">Start New Session</div>
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:2px">A fresh random code will be generated automatically each time.</p>
      <label>Session Title</label>
      <input id="stitle" type="text" placeholder="e.g. Week 5 &mdash; Monday lecture">
      ${ST.msg ? `<div class="${ST.msgOk ? 'ok' : 'err'}">${ST.msg}</div>` : ''}
      <button class="btn green" onclick="startSession()">&#x25B6; Generate Code &amp; Start Session</button>
    `}

    <hr class="divider">
    <div class="section-title">All Students (${allStudents.length})</div>
    <div class="search-wrap">
      <input type="text" placeholder="&#x1F50D; Search by name or ID&hellip;" value="${ST.search}" oninput="ST.search=this.value;render()">
    </div>
    ${filtered.length === 0 ? `<div class="no-data">No students found.</div>` : `
    <div class="scroll-list">
      ${filtered.map(st => {
        const att = closed.filter(s => s.marked.includes(st.id)).length;
        const pct = closed.length ? Math.round(att / closed.length * 100) : 0;
        return `<div class="student-row">
          <div>
            <div style="font-weight:500">${st.name}</div>
            <div style="font-size:12px;color:var(--text-muted)">${st.id}</div>
          </div>
          <span class="badge blue">${att}/${closed.length} &mdash; ${pct}%</span>
        </div>`;
      }).join('')}
    </div>`}

    <hr class="divider">
    <div class="section-title">Session History</div>
    ${closed.length === 0 ? `<div class="no-data">No completed sessions yet.</div>` : `
    <div class="scroll-list">
      ${closed.slice().reverse().map(s => `
        <div class="att-row">
          <div>
            <div class="row-title">${s.title}</div>
            <div class="row-sub">${s.date}</div>
          </div>
          <span class="badge blue">${s.marked.length} present</span>
        </div>`).join('')}
    </div>`}
  </div>`;
}

/* ── ACTIONS ── */
function setRole(r) { ST.role = r; ST.msg = ''; render(); }
function setTab(t)  { ST.tab  = t; ST.msg = ''; render(); }

function doLogin() {
  const id  = val('lid');
  const pwd = val('lpwd');
  const cap = parseInt(val('lcap'));
  if (!id || !pwd) return msg('Please fill all fields.');
  if (cap !== ST.ca + ST.cb) { genCaptcha(); return msg('Captcha answer is incorrect. Try again.'); }
  const u = DB.users[id];
  if (!u || u.password !== pwd) return msg('Wrong ID or password.');
  if (ST.role === 'instructor' && u.role !== 'instructor') return msg('This ID is not an instructor account.');
  if (ST.role === 'student'    && u.role !== 'student')    return msg('This ID is not a student account.');
  ST.user = u; ST.screen = 'dash'; ST.msg = ''; render();
}

function doReg() {
  const id   = val('rid');
  const name = val('rname');
  const pwd  = val('rpwd');
  const pwd2 = val('rpwd2');
  if (!id || !name || !pwd || !pwd2) return msg('Please fill all fields.');
  if (pwd !== pwd2)  return msg('Passwords do not match.');
  if (id.length < 3) return msg('ID must be at least 3 characters.');
  if (DB.users[id])  return msg(`ID "${id}" is already registered. Please choose a different one.`);
  if (ST.role === 'instructor') {
    const sec = val('isec');
    if (sec !== INST_SECRET) return msg('Incorrect instructor secret code.');
  }
  DB.users[id] = { id, name, password: pwd, role: ST.role };
  saveDB();
  msg('Account created! You can now login.', true);
  setTimeout(() => { ST.tab = 'login'; ST.msg = ''; render(); }, 1500);
}

function startSession() {
  const title = val('stitle');
  if (!title) return msg('Please enter a session title.');
  DB.active = {
    id: Date.now(), title,
    code: genCode(),
    date: new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }),
    marked: [], closed: false
  };
  saveDB(); ST.msg = ''; render();
}

function endSession() {
  if (!DB.active) return;
  DB.active.closed = true;
  DB.sessions.push({ ...DB.active });
  DB.active = null;
  saveDB(); render();
}

function markAtt() {
  const code = val('scode');
  if (!DB.active || DB.active.closed) {
    ST.msg = 'No active session. The code has expired.'; ST.msgOk = false; render(); return;
  }
  if (code.toUpperCase() !== DB.active.code) {
    ST.msg = 'Wrong code. Double-check with your instructor.'; ST.msgOk = false; render(); return;
  }
  if (DB.active.marked.includes(ST.user.id)) {
    ST.msg = 'Already marked!'; ST.msgOk = true; render(); return;
  }
  DB.active.marked.push(ST.user.id);
  saveDB(); ST.msg = 'Attendance marked successfully!'; ST.msgOk = true; render();
}

function logout() {
  if (ST.user && ST.user.role === 'instructor' && DB.active && !DB.active.closed) {
    DB.active.closed = true;
    DB.sessions.push({ ...DB.active });
    DB.active = null;
    saveDB();
  }
  ST.screen = 'home'; ST.user = null; ST.msg = ''; ST.search = ''; render();
}

function msg(m, ok = false) { ST.msg = m; ST.msgOk = ok; render(); }
function val(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }

function bindAll() {
  const map = [
    ['lid',    doLogin], ['lpwd',   doLogin], ['lcap',  doLogin],
    ['rid',    doReg],   ['rname',  doReg],   ['rpwd',  doReg],  ['rpwd2', doReg],
    ['scode',  markAtt], ['stitle', startSession]
  ];
  map.forEach(([id, fn]) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') fn(); });
  });
}

genCaptcha();
render();
</script>
</body>
